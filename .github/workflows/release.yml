name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Validation ──────────────────────────────────────────────────────────────
  # Runs the same checks as the local pre-commit hook before any build starts.
  # The release job will not run if any step here fails.
  validate:
    name: Validate (type-check · lint · clippy)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check
        run: npm run types

      - name: Lint
        run: npm run lint

      - name: Clippy
        run: |
          cargo clippy --manifest-path src-tauri/Cargo.toml \
            -- -W clippy::all -W clippy::pedantic -D warnings

  # ── Production build ────────────────────────────────────────────────────────
  # Only runs after validate succeeds. Produces a universal macOS binary and
  # publishes a draft GitHub Release with install instructions.
  release:
    name: Build & publish macOS release
    needs: validate
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build universal binary and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AI Pulse ${{ github.ref_name }}"
          releaseBody: |
            ## Install
            1. Download `AI.Pulse_${{ github.ref_name }}_universal.dmg`
            2. Open the DMG and drag AI Pulse to Applications
            3. **First launch:** right-click → Open to bypass the Gatekeeper prompt

            **Requires macOS 13 Ventura or later**
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
